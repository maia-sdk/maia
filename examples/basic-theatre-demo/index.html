<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maia — Live Agent Theatre</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a25;
      --border: #2a2a3a;
      --text: #e4e4ef;
      --text2: #8888a0;
      --accent: #7c3aed;
      --accent2: #a78bfa;
      --green: #22c55e;
      --blue: #3b82f6;
      --amber: #f59e0b;
      --red: #ef4444;
      --teal: #14b8a6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

    /* ── Layout ─────────────────────────────────────────────────── */
    .app { display: grid; grid-template-columns: 220px 1fr 380px; grid-template-rows: 56px 1fr 48px; height: 100vh; }

    /* ── Top bar ────────────────────────────────────────────────── */
    .topbar { grid-column: 1 / -1; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 16px; }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: var(--accent2); }
    .run-badge { font-size: 11px; background: var(--surface2); border: 1px solid var(--border); padding: 3px 10px; border-radius: 12px; color: var(--text2); }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .cost-chip { font-size: 11px; color: var(--green); background: rgba(34,197,94,0.1); padding: 3px 10px; border-radius: 12px; font-family: 'SF Mono', monospace; }
    .events-chip { font-size: 11px; color: var(--text2); }

    /* ── Sidebar ────────────────────────────────────────────────── */
    .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 16px; overflow-y: auto; }
    .sidebar h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text2); margin-bottom: 12px; }
    .agent-card { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 10px; margin-bottom: 6px; cursor: default; transition: background 0.2s; }
    .agent-card:hover { background: var(--surface2); }
    .agent-card.active { background: rgba(124,58,237,0.12); border: 1px solid rgba(124,58,237,0.25); }
    .agent-avatar { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; position: relative; }
    .agent-avatar .status { position: absolute; bottom: -2px; right: -2px; width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--surface); }
    .agent-info { min-width: 0; }
    .agent-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .agent-role { font-size: 11px; color: var(--text2); }
    .agent-status-text { font-size: 10px; color: var(--accent2); margin-top: 2px; font-style: italic; }

    /* ── Theatre (center) ───────────────────────────────────────── */
    .theatre { background: var(--bg); overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 2px; }
    .theatre-header { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); padding-bottom: 12px; border-bottom: 1px solid var(--border); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }

    /* Activity row */
    .activity-row { display: flex; align-items: flex-start; gap: 12px; padding: 6px 0; opacity: 0; transform: translateY(8px); transition: opacity 0.4s, transform 0.4s; }
    .activity-row.visible { opacity: 1; transform: translateY(0); }
    .activity-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
    .activity-body { flex: 1; min-width: 0; }
    .activity-agent { font-size: 11px; font-weight: 600; }
    .activity-detail { font-size: 12px; color: var(--text2); margin-top: 1px; }
    .activity-url { font-size: 11px; color: var(--blue); text-decoration: none; margin-top: 2px; display: block; }
    .activity-time { font-size: 10px; color: var(--text2); margin-left: auto; white-space: nowrap; padding-left: 8px; }
    .activity-connector { display: inline-block; font-size: 9px; background: var(--surface2); border: 1px solid var(--border); padding: 1px 6px; border-radius: 6px; margin-left: 6px; color: var(--text2); }

    /* Surface card (shown when agents browse/edit/search) */
    .surface-card { margin: 4px 0 4px 40px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; opacity: 0; transform: translateY(8px); transition: opacity 0.5s, transform 0.5s; }
    .surface-card.visible { opacity: 1; transform: translateY(0); }
    .surface-bar { height: 32px; background: var(--surface2); display: flex; align-items: center; padding: 0 10px; gap: 6px; border-bottom: 1px solid var(--border); }
    .surface-dot { width: 8px; height: 8px; border-radius: 50%; }
    .surface-url { font-size: 11px; color: var(--text2); margin-left: 8px; flex: 1; background: rgba(0,0,0,0.2); padding: 2px 8px; border-radius: 4px; }
    .surface-body { padding: 12px; font-size: 12px; color: var(--text2); line-height: 1.6; min-height: 60px; }
    .surface-body .highlight { color: var(--amber); font-weight: 500; }

    /* Artifact card */
    .artifact-card { margin: 6px 0 6px 40px; background: linear-gradient(135deg, rgba(124,58,237,0.08), rgba(59,130,246,0.06)); border: 1px solid rgba(124,58,237,0.2); border-radius: 10px; padding: 12px 14px; opacity: 0; transform: translateY(8px); transition: opacity 0.5s, transform 0.5s; }
    .artifact-card.visible { opacity: 1; transform: translateY(0); }
    .artifact-card .title { font-size: 12px; font-weight: 600; color: var(--accent2); }
    .artifact-card .kind { font-size: 10px; color: var(--text2); margin-top: 2px; }
    .artifact-card .preview { font-size: 11px; color: var(--text2); margin-top: 6px; line-height: 1.5; }

    /* Review card */
    .review-card { margin: 6px 0 6px 40px; border-radius: 10px; padding: 12px 14px; opacity: 0; transform: translateY(8px); transition: opacity 0.5s, transform 0.5s; }
    .review-card.visible { opacity: 1; transform: translateY(0); }
    .review-card.approve { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2); }
    .review-card.revise { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2); }
    .review-card .verdict { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .review-card.approve .verdict { color: var(--green); }
    .review-card.revise .verdict { color: var(--amber); }
    .review-card .score { font-size: 20px; font-weight: 700; margin-top: 4px; }
    .review-card .feedback { font-size: 12px; color: var(--text2); margin-top: 6px; line-height: 1.5; }
    .review-card .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .review-card .tag { font-size: 10px; background: rgba(255,255,255,0.06); padding: 2px 8px; border-radius: 8px; color: var(--text2); }

    /* ── TeamChat (right) ───────────────────────────────────────── */
    .teamchat { background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
    .teamchat-header { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); padding: 16px 16px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .teamchat-body { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 2px; }

    /* Chat bubble */
    .chat-bubble { display: flex; gap: 10px; padding: 8px 0; opacity: 0; transform: translateY(8px); transition: opacity 0.4s, transform 0.4s; }
    .chat-bubble.visible { opacity: 1; transform: translateY(0); }
    .chat-avatar { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
    .chat-content { flex: 1; min-width: 0; }
    .chat-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .chat-name { font-size: 12px; font-weight: 600; }
    .chat-intent { font-size: 9px; padding: 1px 6px; border-radius: 8px; font-weight: 500; }
    .chat-intent.propose { background: rgba(59,130,246,0.15); color: var(--blue); }
    .chat-intent.challenge { background: rgba(239,68,68,0.15); color: var(--red); }
    .chat-intent.agree { background: rgba(34,197,94,0.15); color: var(--green); }
    .chat-intent.summarize { background: rgba(124,58,237,0.15); color: var(--accent2); }
    .chat-intent.delegate { background: rgba(245,158,11,0.15); color: var(--amber); }
    .chat-time { font-size: 10px; color: var(--text2); margin-left: auto; }
    .chat-thinking { background: rgba(245,158,11,0.06); border: 1px solid rgba(245,158,11,0.15); border-radius: 8px; padding: 6px 10px; font-size: 11px; font-style: italic; color: var(--amber); margin-bottom: 4px; line-height: 1.4; }
    .chat-text { font-size: 13px; line-height: 1.55; color: var(--text); }

    /* Typing indicator */
    .typing { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
    .typing .dots { display: flex; gap: 3px; }
    .typing .dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--text2); animation: typingDot 1.4s infinite; }
    .typing .dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingDot { 0%,60%,100%{opacity:0.3;transform:translateY(0)} 30%{opacity:1;transform:translateY(-3px)} }
    .typing-label { font-size: 11px; color: var(--text2); }

    /* Handoff banner */
    .handoff-banner { display: flex; align-items: center; gap: 8px; padding: 8px 12px; margin: 4px 0; background: rgba(245,158,11,0.06); border: 1px dashed rgba(245,158,11,0.3); border-radius: 8px; font-size: 11px; color: var(--amber); opacity: 0; transform: translateY(8px); transition: opacity 0.4s, transform 0.4s; }
    .handoff-banner.visible { opacity: 1; transform: translateY(0); }

    /* ── Bottom bar ─────────────────────────────────────────────── */
    .bottombar { grid-column: 1 / -1; background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 16px; }
    .controls { display: flex; align-items: center; gap: 8px; }
    .btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; transition: background 0.2s, border-color 0.2s; }
    .btn:hover { background: var(--border); border-color: var(--text2); }
    .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .speed-label { font-size: 11px; color: var(--text2); min-width: 30px; text-align: center; }
    .progress-bar { flex: 1; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; margin: 0 12px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--blue)); border-radius: 2px; transition: width 0.3s; width: 0%; }
    .timer { font-size: 11px; color: var(--text2); font-family: 'SF Mono', monospace; }

    /* ── Scrollbar ──────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text2); }
  </style>
</head>
<body>
<div class="app">
  <!-- Top bar -->
  <div class="topbar">
    <div class="logo">maia<span>.theatre</span></div>
    <div class="live-dot"></div>
    <div class="run-badge">run: demo_001</div>
    <div class="topbar-right">
      <div class="cost-chip" id="cost">$0.0000</div>
      <div class="events-chip"><span id="evt-count">0</span> events</div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <h3>Agents</h3>
    <div id="agents-list"></div>
  </div>

  <!-- Theatre -->
  <div class="theatre" id="theatre">
    <div class="theatre-header">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      Actions
    </div>
  </div>

  <!-- TeamChat -->
  <div class="teamchat">
    <div class="teamchat-header">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      Team Chat
    </div>
    <div class="teamchat-body" id="chat"></div>
  </div>

  <!-- Bottom bar -->
  <div class="bottombar">
    <div class="controls">
      <button class="btn active" id="btn-play" title="Play/Pause">&#9654;</button>
      <button class="btn" id="btn-restart" title="Restart">&#8634;</button>
      <button class="btn" id="btn-speed" title="Speed">1x</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="timer" id="timer">0:00 / 0:45</div>
  </div>
</div>

<script type="module">
// ── Agent Definitions ─────────────────────────────────────────────────────
const AGENTS = {
  brain:      { name: 'Maia Brain',  role: 'Orchestrator', emoji: '\ud83e\udde0', color: '#8B5CF6' },
  researcher: { name: 'Researcher',  role: 'Web Research',  emoji: '\ud83d\udd0d', color: '#3B82F6' },
  analyst:    { name: 'Analyst',     role: 'Data Analysis', emoji: '\ud83d\udcca', color: '#10B981' },
  writer:     { name: 'Writer',      role: 'Report Writer', emoji: '\u270d\ufe0f',  color: '#F59E0B' },
};

// ── Demo Script ───────────────────────────────────────────────────────────
// Each entry: [delayMs, theatreElement, chatElement]
// Theatre shows ACTIONS, Chat shows CONVERSATIONS
const SCRIPT = [
  // Brain delegates
  { t: 800, agent: 'brain', type: 'message', intent: 'delegate',
    content: 'Team, the client needs a competitive analysis of AI agent frameworks. Researcher — map the landscape. Analyst — verify numbers. Writer — prepare the brief.',

  // Brain plans the task
  { t: 1500, agent: 'brain', type: 'activity', activity: 'thinking',
    detail: 'Planning task breakdown: research \u2192 analysis \u2192 writing \u2192 review' },

  // Researcher starts searching
  { t: 2000, agent: 'researcher', type: 'activity', activity: 'searching',
    detail: 'Scanning GitHub stars, npm downloads, and HackerNews sentiment' },

  { t: 2800, agent: 'researcher', type: 'activity', activity: 'searching',
    detail: 'Querying npm registry: weekly downloads for langchain, crewai, autogen, @maia/sdk' },

  // Browser surface — researcher browsing
  { t: 3500, agent: 'researcher', type: 'surface', surface: 'browser',
    url: 'https://star-history.com/#langchain-ai/langchain&crewai/crewai',
    title: 'Star History — Framework Comparison',
    body: '<span class="highlight">LangChain: 82,400 ★</span> — broadest ecosystem, 2,100+ integrations\n<span class="highlight">CrewAI: 18,200 ★</span> — role-based, fastest growth (6x in 12 months)\n<span class="highlight">AutoGen: 29,100 ★</span> — Microsoft-backed, conversation-centric\n<span class="highlight">Maia: 2,400 ★</span> — ACP protocol, theatre visualization, unique observability' },

  // Researcher shares findings
  { t: 6000, agent: 'researcher', type: 'message', intent: 'propose',
    content: 'Landscape mapped. Key findings:\n\n• LangChain: 82k stars, broadest ecosystem, steep learning curve\n• CrewAI: 18k stars, role-based agents, growing 6x YoY\n• AutoGen: 29k stars, Microsoft-backed, conversation-centric\n• Maia: ACP protocol + Theatre viz — unique observability angle no one else has',
    thinking: 'The observability gap is real — none of the others let you WATCH agents work. That\'s the positioning.' },

  // Handoff to analyst
  { t: 8500, agent: 'researcher', type: 'handoff', to: 'analyst',
    task: 'Verify the growth numbers and identify where Maia has competitive advantage' },

  // Analyst working — data surface
  { t: 9500, agent: 'analyst', type: 'activity', activity: 'thinking',
    detail: 'Loading npm download stats from registry API...' },

  { t: 10000, agent: 'analyst', type: 'activity', activity: 'analyzing',
    detail: 'Cross-referencing GitHub stars, npm weekly downloads, and Discord community size' },

  { t: 10800, agent: 'analyst', type: 'surface', surface: 'browser',
    url: 'https://npmtrends.com/langchain-vs-crewai-vs-autogen-vs-@maia/sdk',
    title: 'npm trends \u2014 Framework Downloads',
    body: '<span class="highlight">langchain</span>  1,243,891 /wk  \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588 \n<span class="highlight">autogen</span>      210,432 /wk  \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\n<span class="highlight">crewai</span>        89,201 /wk  \u2588\u2588\u2588\n<span class="highlight">@maia/sdk</span>      3,241 /wk  \u258f\n\nGrowth (30d): crewai <span class="highlight">+42%</span>  maia <span class="highlight">+67%</span>  autogen +8%  langchain +3%' },

  { t: 11500, agent: 'analyst', type: 'surface', surface: 'database',
    title: 'Comparison Matrix',
    body: '┌───────────┬──────────┬───────────┬────────────┬──────────┐\n│ Framework │ Stars    │ npm/wk    │ Community  │ Observe? │\n├───────────┼──────────┼───────────┼────────────┼──────────┤\n│ LangChain │ 82,400   │ 1.2M      │ 42k Discord│ <span class="highlight">No</span>       │\n│ CrewAI    │ 18,200   │ 89k       │ 8k Discord │ <span class="highlight">No</span>       │\n│ AutoGen   │ 29,100   │ 210k      │ 15k Discord│ <span class="highlight">No</span>       │\n│ Maia      │ 2,400    │ 3.2k      │ 1.2k       │ <span class="highlight">Yes ✓</span>    │\n└───────────┴──────────┴───────────┴────────────┴──────────┘' },

  // Analyst challenges
  { t: 14000, agent: 'analyst', type: 'message', intent: 'challenge',
    content: 'The data confirms Maia\'s differentiation is observability — Theatre + TeamChat. No other framework lets you WATCH agents work live.\n\nBut the ecosystem is 20x smaller. Recommendation: position as "the observability layer" that works WITH other frameworks via adapters, not against them.',
    thinking: 'The adapter strategy (LangChain, CrewAI, AutoGen) is the moat. Don\'t compete on ecosystem — augment it.' },

  // Brain agrees
  { t: 17000, agent: 'brain', type: 'message', intent: 'agree',
    content: 'Strong insight. The "layer, not replacement" positioning aligns with our adapter strategy. Writer — take this angle for the brief.' },

  // Handoff to writer
  { t: 18500, agent: 'brain', type: 'handoff', to: 'writer',
    task: 'Write a 2-page competitive brief positioning Maia as the observability layer' },

  // Writer working — editor surface
  { t: 19500, agent: 'writer', type: 'activity', activity: 'thinking',
    detail: 'Outlining brief structure: summary → positioning → matrix → recommendations' },

  { t: 20000, agent: 'writer', type: 'activity', activity: 'writing',
    detail: 'Drafting competitive brief with framework comparison matrix' },

  { t: 20800, agent: 'writer', type: 'activity', activity: 'writing',
    detail: 'Incorporating analyst data into executive summary section' },

  { t: 21500, agent: 'writer', type: 'surface', surface: 'editor',
    title: 'competitive-brief.md',
    body: '## AI Agent Frameworks — Competitive Brief\n\n### Executive Summary\nThe AI agent framework market has consolidated around four players.\nMaia\'s differentiation is <span class="highlight">observability</span> — the only SDK that lets\nteams watch agents work live via Theatre and TeamChat.\n\n### Positioning\n<span class="highlight">"The collaboration and observability layer for AI agents."</span>\nNot a replacement for LangChain or CrewAI — an augmentation.\nAdapters bridge any framework to ACP events.\n\n### Competitive Matrix\n...' },

  // Writer produces artifact
  { t: 24000, agent: 'writer', type: 'artifact',
    kind: 'document', title: 'Competitive Brief: AI Agent Frameworks 2026',
    content: 'The AI agent framework market has consolidated around four key players. Maia\'s unique position is observability...' },

  // Writer presents
  { t: 25500, agent: 'writer', type: 'message', intent: 'propose',
    content: 'Brief complete. Key positioning: Maia is the collaboration and observability LAYER — it doesn\'t replace LangChain or CrewAI, it makes them visible.\n\nThe adapter strategy (works with any framework) is the moat. Theatre + TeamChat are the proof points no competitor can match.' },

  // Brain reviewing
  { t: 27000, agent: 'brain', type: 'activity', activity: 'reviewing',
    detail: 'Evaluating brief against task requirements and data accuracy' },

  // Brain reviews — approve
  { t: 28000, agent: 'brain', type: 'review', verdict: 'approve', score: 0.94,
    feedback: 'Excellent brief. The "layer, not replacement" framing is exactly right.',
    strengths: ['Clear competitive matrix', 'Data-backed positioning', 'Actionable recommendations', 'Adapter strategy validated'] },

  // Final summary
  { t: 30000, agent: 'brain', type: 'message', intent: 'summarize',
    content: 'Task complete. Competitive brief approved (94% confidence). Key decision: position Maia as the observability layer for AI agents, not a framework replacement. Ship it.' },
];

// ── State ─────────────────────────────────────────────────────────────────
let playing = true;
let speed = 1;
let scriptIdx = 0;
let eventCount = 0;
let totalCost = 0;
const totalDuration = 32000;
let startTime = Date.now();
let pausedAt = 0;
let pausedElapsed = 0;
const agentStates = {};

const theatre = document.getElementById('theatre');
const chat = document.getElementById('chat');
const agentsList = document.getElementById('agents-list');

// ── Render agents sidebar ─────────────────────────────────────────────────
function renderAgents() {
  agentsList.innerHTML = '';
  for (const [id, a] of Object.entries(AGENTS)) {
    const s = agentStates[id] || {};
    const card = document.createElement('div');
    card.className = `agent-card ${s.active ? 'active' : ''}`;
    card.innerHTML = `
      <div class="agent-avatar" style="background:${a.color}20">
        ${a.emoji}
        <div class="status" style="background:${s.active ? 'var(--green)' : 'var(--text2)'}"></div>
      </div>
      <div class="agent-info">
        <div class="agent-name">${a.name}</div>
        <div class="agent-role">${a.role}</div>
        ${s.status ? `<div class="agent-status-text">${s.status}</div>` : ''}
      </div>`;
    agentsList.appendChild(card);
  }
}

// ── Render helpers ────────────────────────────────────────────────────────
function addActivity(agent, icon, detail, extra = '') {
  const a = AGENTS[agent];
  const row = document.createElement('div');
  row.className = 'activity-row';
  row.innerHTML = `
    <div class="activity-icon" style="background:${a.color}18;color:${a.color}">${icon}</div>
    <div class="activity-body">
      <div class="activity-agent" style="color:${a.color}">${a.name}</div>
      <div class="activity-detail">${detail}</div>
      ${extra}
    </div>
    <div class="activity-time">${formatTime()}</div>`;
  theatre.appendChild(row);
  requestAnimationFrame(() => row.classList.add('visible'));
  theatre.scrollTop = theatre.scrollHeight;
}

function addSurface(agent, type, title, url, body) {
  const card = document.createElement('div');
  card.className = 'surface-card';
  const dots = type === 'browser'
    ? '<div class="surface-dot" style="background:#ef4444"></div><div class="surface-dot" style="background:#f59e0b"></div><div class="surface-dot" style="background:#22c55e"></div>'
    : '<div class="surface-dot" style="background:var(--accent)"></div>';
  card.innerHTML = `
    <div class="surface-bar">
      ${dots}
      ${url ? `<div class="surface-url">${url}</div>` : `<div class="surface-url">${title}</div>`}
    </div>
    <div class="surface-body"><pre style="white-space:pre-wrap;font-family:inherit;margin:0;">${body}</pre></div>`;
  theatre.appendChild(card);
  requestAnimationFrame(() => card.classList.add('visible'));
  theatre.scrollTop = theatre.scrollHeight;
}

function addChatBubble(agent, intent, content, thinking) {
  const a = AGENTS[agent];
  const intLabels = { propose: 'Proposes', challenge: 'Challenges', agree: 'Agrees', summarize: 'Summarizes', delegate: 'Delegates' };

  // Remove any typing indicator
  const typ = chat.querySelector('.typing');
  if (typ) typ.remove();

  const bubble = document.createElement('div');
  bubble.className = 'chat-bubble';
  bubble.innerHTML = `
    <div class="chat-avatar" style="background:${a.color}20">${a.emoji}</div>
    <div class="chat-content">
      <div class="chat-meta">
        <span class="chat-name" style="color:${a.color}">${a.name}</span>
        <span class="chat-intent ${intent}">${intLabels[intent] || intent}</span>
        <span class="chat-time">${formatTime()}</span>
      </div>
      ${thinking ? `<div class="chat-thinking">\ud83d\udca1 ${thinking}</div>` : ''}
      <div class="chat-text">${content.replace(/\n/g, '<br>')}</div>
    </div>`;
  chat.appendChild(bubble);
  requestAnimationFrame(() => bubble.classList.add('visible'));
  chat.scrollTop = chat.scrollHeight;
}

function addHandoff(from, to, task) {
  const f = AGENTS[from], t = AGENTS[to];
  // Theatre
  addActivity(from, '\u2192', `Handoff to ${t.name}`, `<div class="activity-detail" style="margin-top:2px;font-style:italic">${task}</div>`);
  // Chat
  const banner = document.createElement('div');
  banner.className = 'handoff-banner';
  banner.innerHTML = `${f.emoji} <strong>${f.name}</strong> &rarr; ${t.emoji} <strong>${t.name}</strong> &nbsp;&mdash;&nbsp; ${task}`;
  chat.appendChild(banner);
  requestAnimationFrame(() => banner.classList.add('visible'));
  chat.scrollTop = chat.scrollHeight;
}

function addArtifact(agent, kind, title, content) {
  const card = document.createElement('div');
  card.className = 'artifact-card';
  card.innerHTML = `
    <div class="title">\ud83d\udcc4 ${title}</div>
    <div class="kind">${kind} &middot; text/markdown</div>
    <div class="preview">${content.slice(0, 120)}...</div>`;
  theatre.appendChild(card);
  requestAnimationFrame(() => card.classList.add('visible'));
  theatre.scrollTop = theatre.scrollHeight;
}

function addReview(verdict, score, feedback, strengths) {
  const card = document.createElement('div');
  card.className = `review-card ${verdict}`;
  card.innerHTML = `
    <div class="verdict">${verdict === 'approve' ? '\u2705' : '\u26a0\ufe0f'} ${verdict}</div>
    <div class="score">${(score * 100).toFixed(0)}%</div>
    <div class="feedback">${feedback}</div>
    <div class="tags">${(strengths || []).map(s => `<span class="tag">${s}</span>`).join('')}</div>`;
  theatre.appendChild(card);
  requestAnimationFrame(() => card.classList.add('visible'));
  theatre.scrollTop = theatre.scrollHeight;

  // Also show in chat
  const typ = chat.querySelector('.typing');
  if (typ) typ.remove();
  const bubble = document.createElement('div');
  bubble.className = 'chat-bubble';
  const a = AGENTS.brain;
  bubble.innerHTML = `
    <div class="chat-avatar" style="background:${a.color}20">${a.emoji}</div>
    <div class="chat-content">
      <div class="chat-meta">
        <span class="chat-name" style="color:${a.color}">${a.name}</span>
        <span class="chat-intent agree">${verdict === 'approve' ? 'Approved' : 'Revise'}</span>
        <span class="chat-time">${formatTime()}</span>
      </div>
      <div class="chat-text">${verdict === 'approve' ? '\u2705' : '\u26a0\ufe0f'} <strong>${(score*100).toFixed(0)}%</strong> — ${feedback}</div>
    </div>`;
  chat.appendChild(bubble);
  requestAnimationFrame(() => bubble.classList.add('visible'));
  chat.scrollTop = chat.scrollHeight;
}

function showTyping(agent) {
  const existing = chat.querySelector('.typing');
  if (existing) existing.remove();
  const a = AGENTS[agent];
  const typ = document.createElement('div');
  typ.className = 'typing';
  typ.innerHTML = `
    <div class="chat-avatar" style="background:${a.color}20;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;">${a.emoji}</div>
    <div class="dots"><span></span><span></span><span></span></div>
    <span class="typing-label">${a.name} is typing...</span>`;
  chat.appendChild(typ);
  chat.scrollTop = chat.scrollHeight;
}

function formatTime() {
  const elapsed = getElapsed();
  const m = Math.floor(elapsed / 60000);
  const s = Math.floor((elapsed % 60000) / 1000);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function getElapsed() {
  if (!playing) return pausedElapsed;
  return (Date.now() - startTime) * speed;
}

function updateUI() {
  const elapsed = getElapsed();
  const pct = Math.min(100, (elapsed / totalDuration) * 100);
  document.getElementById('progress').style.width = pct + '%';
  const m = Math.floor(elapsed / 60000);
  const s = Math.floor((elapsed % 60000) / 1000);
  document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2, '0')} / 0:32`;
  document.getElementById('evt-count').textContent = eventCount;
  document.getElementById('cost').textContent = `$${totalCost.toFixed(4)}`;
  requestAnimationFrame(updateUI);
}

// ── Playback Engine ───────────────────────────────────────────────────────
function scheduleNext() {
  if (scriptIdx >= SCRIPT.length || !playing) return;
  const step = SCRIPT[scriptIdx];
  const elapsed = getElapsed();
  const delay = Math.max(0, (step.t - elapsed) / speed);

  setTimeout(() => {
    if (!playing || scriptIdx >= SCRIPT.length) return;
    const s = SCRIPT[scriptIdx];
    scriptIdx++;
    eventCount++;
    totalCost += 0.001 + Math.random() * 0.003;

    // Update agent state
    for (const id of Object.keys(AGENTS)) agentStates[id] = { active: false, status: '' };
    agentStates[s.agent] = { active: true, status: '' };

    const icons = { searching: '\ud83d\udd0d', analyzing: '\ud83d\udcca', writing: '\u270d\ufe0f', reading: '\ud83d\udcd6', reviewing: '\ud83d\udd0e', thinking: '\ud83e\udd14' };

    if (s.type === 'message') {
      agentStates[s.agent].status = `${s.intent}...`;
      showTyping(s.agent);
      setTimeout(() => {
        addChatBubble(s.agent, s.intent, s.content, s.thinking);
      }, 600 / speed);
    } else if (s.type === 'activity') {
      agentStates[s.agent].status = s.activity;
      addActivity(s.agent, icons[s.activity] || '\u2022', s.detail);
    } else if (s.type === 'surface') {
      agentStates[s.agent].status = `viewing ${s.surface}`;
      addSurface(s.agent, s.surface, s.title, s.url, s.body);
    } else if (s.type === 'handoff') {
      addHandoff(s.agent, s.to, s.task);
    } else if (s.type === 'artifact') {
      addArtifact(s.agent, s.kind, s.title, s.content);
    } else if (s.type === 'review') {
      addReview(s.verdict, s.score, s.feedback, s.strengths);
    }

    renderAgents();
    scheduleNext();
  }, delay);
}

// ── Controls ──────────────────────────────────────────────────────────────
document.getElementById('btn-play').addEventListener('click', function() {
  playing = !playing;
  this.innerHTML = playing ? '&#9654;' : '&#9646;&#9646;';
  this.classList.toggle('active', playing);
  if (playing) {
    startTime = Date.now() - pausedElapsed / speed;
    scheduleNext();
  } else {
    pausedElapsed = getElapsed();
  }
});

document.getElementById('btn-restart').addEventListener('click', () => {
  scriptIdx = 0;
  eventCount = 0;
  totalCost = 0;
  startTime = Date.now();
  pausedElapsed = 0;
  playing = true;
  document.getElementById('btn-play').innerHTML = '&#9654;';
  document.getElementById('btn-play').classList.add('active');
  theatre.querySelectorAll('.activity-row,.surface-card,.artifact-card,.review-card').forEach(e => e.remove());
  chat.innerHTML = '';
  for (const id of Object.keys(AGENTS)) agentStates[id] = { active: false, status: '' };
  renderAgents();
  scheduleNext();
});

document.getElementById('btn-speed').addEventListener('click', function() {
  const speeds = [1, 2, 4, 0.5];
  const i = speeds.indexOf(speed);
  speed = speeds[(i + 1) % speeds.length];
  this.textContent = speed + 'x';
  if (playing) startTime = Date.now() - getElapsed() / speed;
});

// ── Boot ──────────────────────────────────────────────────────────────────
renderAgents();
updateUI();
scheduleNext();
</script>
</body>
</html>
