[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "maia-computer-use"
version = "0.1.0"
description = "Maia computer runtime client for Python"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = ["httpx>=0.25.0"]
keywords = ["ai", "agent", "browser", "computer-use", "runtime", "maia"]
authors = [{name = "Maia AI"}]

[project.urls]
Homepage = "https://github.com/maia-sdk/maia"
Repository = "https://github.com/maia-sdk/maia"

[tool.setuptools]
packages = ["maia_computer_use"]
