[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "maia-computer-use"
version = "0.1.0"
description = "Browser automation for AI agents — Playwright wrapper with ACP event emission"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = ["maia-acp>=0.1.0"]
keywords = ["ai", "agent", "browser", "automation", "playwright", "computer-use", "maia"]
authors = [{name = "Maia AI"}]

[project.urls]
Homepage = "https://github.com/maia-sdk/maia"
Repository = "https://github.com/maia-sdk/maia"

[project.optional-dependencies]
playwright = ["playwright>=1.40.0"]