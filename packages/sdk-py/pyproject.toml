[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "maia-sdk"
version = "0.1.0"
description = "Maia SDK - the collaboration and observability layer for AI agents. One install, everything you need."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "Maia AI" }]
keywords = [
    "ai", "agent", "protocol", "multi-agent", "collaboration",
    "observability", "acp", "maia", "langchain", "crewai", "autogen",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "maia-acp>=0.1.0",
    "maia-brain>=0.1.0",
    "maia-connectors>=0.1.0",
    "maia-teamchat>=0.1.0",
    "maia-theatre>=0.1.0",
]

[project.optional-dependencies]
computer-use = ["maia-computer-use>=0.1.0"]
langchain = ["maia-adapters[langchain]>=0.1.0"]
crewai = ["maia-adapters[crewai]>=0.1.0"]
autogen = ["maia-adapters[autogen]>=0.1.0"]
all = [
    "maia-computer-use>=0.1.0",
    "maia-adapters[all]>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/maia-sdk/maia"
Documentation = "https://github.com/maia-sdk/maia"
Repository = "https://github.com/maia-sdk/maia"

[tool.hatch.build.targets.wheel]
packages = ["maia_sdk"]
