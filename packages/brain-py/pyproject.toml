[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "maia-brain"
version = "0.1.0"
description = "Multi-agent orchestration runtime — plan, delegate, execute, review, synthesize"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = ["maia-acp>=0.1.0", "httpx>=0.25.0", "pydantic>=2.0.0"]
keywords = ["ai", "agent", "orchestration", "multi-agent", "brain", "maia"]
authors = [{name = "Maia AI"}]

[project.urls]
Homepage = "https://github.com/maia-sdk/maia"
Repository = "https://github.com/maia-sdk/maia"

[project.optional-dependencies]
openai = ["openai>=1.0.0"]
anthropic = ["anthropic>=0.30.0"]
all = ["openai>=1.0.0", "anthropic>=0.30.0"]