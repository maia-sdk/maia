[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "maia-teamchat"
version = "0.1.0"
description = "Agent conversation UI — serve the TeamChat view from Python with one line of code"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = ["maia-acp>=0.1.0"]
keywords = ["ai", "agent", "chat", "conversation", "teamchat", "maia"]
authors = [{name = "Maia AI"}]

[project.urls]
Homepage = "https://github.com/maia-sdk/maia"
Repository = "https://github.com/maia-sdk/maia"

[tool.setuptools.package-data]
maia_teamchat = ["static/**"]