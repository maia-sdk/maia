[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "maia-cli"
version = "0.1.0"
description = "Maia CLI — stream, replay, validate, and serve ACP agent events from the terminal"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "Maia AI" }]
keywords = ["ai", "agent", "cli", "acp", "maia", "observability"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Environment :: Console",
]
dependencies = [
    "maia-sdk>=0.1.0",
    "httpx>=0.25.0",
]

[project.scripts]
maia = "maia_cli.main:cli"

[project.urls]
Homepage = "https://maia.ai"
Repository = "https://github.com/maia-ai/maia-sdk"

[tool.hatch.build.targets.wheel]
packages = ["maia_cli"]
