name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  js:
    name: JS/TS — build & test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build all packages
        run: pnpm -r build

      - name: Run workspace tests
        run: pnpm -r test

      - name: Run SDK smoke tests
        run: npx tsx test_sdk.ts

  python:
    name: Python — install & test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Python packages (editable)
        run: |
          pip install -e packages/acp-py
          pip install -e packages/connector-adapters
          pip install -e packages/sdk-py
          pip install -e packages/cli-py

      - name: Run Python smoke tests
        run: python test_sdk.py

      - name: Verify CLI entry point
        run: maia info

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm -r run lint
        continue-on-error: true